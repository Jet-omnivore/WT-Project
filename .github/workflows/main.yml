name: CI Build Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
        # This only works if you have a package.json! 
        # If you are using plain HTML/CSS, you can skip this.
      run: npm install

    - name: Run Build/Lint
      run: npm run build --if-present
